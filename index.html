<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f1f3d;--bg3:#162447;
  --gold:#d4a017;--gold2:#f0c040;
  --red:#c0392b;--blue:#2980b9;--green:#27ae60;--orange:#e67e22;
  --white:#e8e0d0;--muted:#8a9bb0;--border:#2a3f5f;
  --fh:'Bebas Neue',sans-serif;--fm:'IBM Plex Mono',monospace;--fb:'IBM Plex Sans JP',sans-serif;
}
body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:8px;font-family:var(--fm);font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1000;padding:12px 24px;font-size:14px}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(212,160,23,.4)}
.btn-sec{background:var(--bg3);color:var(--white);border:1px solid var(--border);padding:9px 18px;font-size:13px}
.btn-sec:hover{border-color:var(--gold)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 12px;font-size:11px}
.btn-ghost:hover{color:var(--white);border-color:var(--muted)}
.btn-sm{padding:6px 11px;font-size:11px}
.btn-toggle{padding:9px 18px;font-size:13px;background:var(--bg3);color:var(--muted);border:2px solid var(--border)}
.btn-toggle.on{background:rgba(39,174,96,.15);color:var(--green);border-color:var(--green)}

.fgroup{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.flabel{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.finput{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--white);font-family:var(--fm);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.finput:focus{border-color:var(--gold)}
select.finput option{background:var(--bg2)}
.card-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.sec-title{font-family:var(--fm);font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}

/* SETUP */
#setup-screen{background:radial-gradient(ellipse at center,var(--bg2),var(--bg) 70%);align-items:center;justify-content:center;padding:16px}
.setup-wrap{width:100%;max-width:680px}
.setup-head{text-align:center;margin-bottom:20px}
.setup-head h1{font-family:var(--fh);font-size:40px;letter-spacing:3px;color:var(--gold)}
.setup-head p{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:4px}
.player-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;padding-right:2px}
.player-row{display:grid;grid-template-columns:22px 1fr;align-items:center;gap:8px}
.player-num{font-family:var(--fh);font-size:15px;color:var(--gold);text-align:center}
.resume-banner{background:var(--bg3);border:1px solid var(--gold);border-radius:8px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer;transition:background .15s}
.resume-banner:hover{background:var(--bg2)}
.resume-text{font-family:var(--fm);font-size:11px;color:var(--gold)}
.resume-sub{font-size:10px;color:var(--muted);margin-top:2px}
/* escalation panel */
.esc-panel{margin-top:10px;padding:12px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--border)}
.esc-panel.hidden{display:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;display:none;align-items:center;justify-content:center;padding:14px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-title{font-family:var(--fh);font-size:22px;color:var(--gold);margin-bottom:12px;letter-spacing:2px}
.save-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:7px}
.save-item-name{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--white)}
.save-item-meta{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px}
.slot-btns{display:flex;gap:5px}

/* GAME */
#game-screen{background:var(--bg);padding:0}
.game-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.g-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:5px;flex-wrap:wrap}
.stage-lbl{font-family:var(--fh);font-size:19px;color:var(--gold);letter-spacing:2px}
.round-lbl{font-family:var(--fm);font-size:10px;color:var(--muted)}
.blind-lbl{font-family:var(--fm);font-size:9px;color:var(--muted);margin-top:1px}
.pot-big{font-family:var(--fh);font-size:22px;color:var(--gold2)}
.pot-lbl{font-family:var(--fm);font-size:9px;color:var(--muted)}
.hdr-btns{display:flex;gap:4px}

/* TABLE */
.table-area{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.tbl-svg{position:absolute;inset:0;pointer-events:none}

/* Community cards */
.card-face{border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);flex-shrink:0}
.card-up{background:linear-gradient(160deg,#f8f4ec,#e8e0d0);border:1.5px solid rgba(255,255,255,.2)}
.card-placeholder{background:rgba(255,255,255,.04);border:1.5px dashed rgba(255,255,255,.1)}
.tbl-pot{position:absolute;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.tbl-pot-num{font-family:var(--fh);font-size:17px;color:var(--gold2);text-shadow:0 0 8px rgba(240,192,64,.5)}
.tbl-pot-lbl{font-family:var(--fm);font-size:8px;color:rgba(255,255,255,.38);letter-spacing:1px}

/* Seats */
.seat{position:absolute;transform:translate(-50%,-50%)}
.seat-card{border-radius:9px;border:2px solid rgba(255,255,255,.1);padding:6px 8px;min-width:78px;max-width:112px;text-align:center;background:rgba(10,22,40,.9);backdrop-filter:blur(4px);transition:all .2s}
.seat-card.active{border-color:var(--blue);background:rgba(41,128,185,.25);box-shadow:0 0 14px rgba(41,128,185,.5)}
.seat-card.folded{opacity:.28;filter:grayscale(.8)}
.seat-card.allin{border-color:#e74c3c;background:rgba(231,76,60,.12);box-shadow:0 0 9px rgba(231,76,60,.3)}
.seat-card.dealer-dummy{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.3)}
.seat-name{font-family:var(--fh);font-size:12px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seat-chips{font-family:var(--fm);font-size:9px;color:var(--gold);margin-top:1px}
.seat-bet{font-family:var(--fm);font-size:8px;color:var(--green);margin-top:1px}
.seat-badges{display:flex;gap:2px;justify-content:center;margin-top:2px;flex-wrap:wrap}
.bdg{font-family:var(--fm);font-size:7px;font-weight:600;padding:1px 4px;border-radius:10px}
.bdg-d{background:rgba(212,160,23,.2);color:var(--gold);border:1px solid var(--gold)}
.bdg-sb{background:rgba(41,128,185,.2);color:#5dade2;border:1px solid #5dade2}
.bdg-bb{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid #e74c3c}
.bdg-ai{background:rgba(231,76,60,.4);color:#ff8080;animation:pulse 1s infinite}
.bdg-f{background:rgba(120,120,120,.2);color:#aaa;border:1px solid #555}
.active-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:blink .7s infinite;margin:2px auto 0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ACTION PANEL */
.action-panel{flex-shrink:0;background:var(--bg2);border-top:2px solid var(--border);padding:9px 12px}
.ap-info{font-family:var(--fm);font-size:11px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ap-player{color:var(--blue);font-size:13px;font-weight:600}
.ap-call{color:var(--green)}
.undo-btn{margin-left:auto;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-family:var(--fm);font-size:9px;cursor:pointer;display:none;align-items:center;gap:3px}
.undo-btn:hover{color:var(--white);border-color:var(--muted)}

/* Raise area */
.raise-area{display:none;align-items:center;gap:6px;margin-bottom:7px;background:rgba(0,0,0,.25);border-radius:7px;padding:7px 10px;flex-wrap:wrap}
.raise-area label{font-family:var(--fm);font-size:10px;color:var(--muted);white-space:nowrap}
.raise-input-wrap{display:flex;align-items:center;gap:0;background:var(--bg);border:1px solid var(--gold);border-radius:6px;overflow:hidden}
.raise-stepper{background:rgba(212,160,23,.15);color:var(--gold);border:none;padding:6px 10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--fm);line-height:1;transition:background .12s}
.raise-stepper:hover{background:rgba(212,160,23,.3)}
.raise-input{background:transparent;border:none;color:var(--gold);font-family:var(--fm);font-size:14px;font-weight:600;width:100px;outline:none;text-align:center;padding:6px 4px}
.raise-hint{font-family:var(--fm);font-size:9px;color:var(--muted)}
.raise-ok{background:var(--gold);color:#1a1000;border:none;border-radius:6px;padding:6px 12px;font-family:var(--fm);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.raise-ok:hover{background:var(--gold2)}
.raise-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:var(--fm);font-size:11px;cursor:pointer}

/* Action buttons */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.act-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 7px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;font-family:var(--fm);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.8px;min-height:58px}
.act-btn:disabled{opacity:.3;cursor:not-allowed}
.act-btn i{font-size:18px}
.act-sub{font-size:9px;font-weight:400;opacity:.85}
.act-fold{background:rgba(100,100,110,.18);border:2px solid #666;color:#bbb}
.act-fold:hover:not(:disabled){background:rgba(130,130,140,.3);border-color:#999;color:#ddd}
.act-check{background:rgba(39,174,96,.15);border:2px solid var(--green);color:#2ecc71}
.act-check:hover:not(:disabled){background:rgba(39,174,96,.3)}
.act-call{background:rgba(41,128,185,.18);border:2px solid var(--blue);color:#5dade2}
.act-call:hover:not(:disabled){background:rgba(41,128,185,.35)}
.act-raise{background:rgba(212,160,23,.12);border:2px solid var(--gold);color:var(--gold)}
.act-raise:hover:not(:disabled){background:rgba(212,160,23,.28)}
.act-allin{grid-column:1/-1;min-height:44px;background:rgba(230,126,34,.15);border:2px solid var(--orange);color:#f39c12;flex-direction:row;gap:6px;font-size:12px}
.act-allin:hover:not(:disabled){background:rgba(230,126,34,.3)}

/* WINNER */
#winner-screen{background:rgba(5,10,20,.97);align-items:center;justify-content:center;padding:16px}
.win-wrap{width:100%;max-width:500px;text-align:center}
.win-title{font-family:var(--fh);font-size:46px;letter-spacing:4px;color:var(--gold);margin-bottom:5px}
.win-sub{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:16px}
.win-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:11px}
.win-card{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.win-card:hover{border-color:var(--gold)}
.win-card.sel{border-color:var(--gold);background:rgba(212,160,23,.1)}
.win-card-name{font-family:var(--fh);font-size:18px}
.win-card-chips{font-family:var(--fm);font-size:11px;color:var(--green)}
.win-check{color:var(--gold);font-size:16px;opacity:0}
.win-card.sel .win-check{opacity:1}

/* END */
#end-screen{background:radial-gradient(ellipse at center,var(--bg3),var(--bg));align-items:center;justify-content:center;padding:16px}
.end-wrap{text-align:center;max-width:480px;width:100%}
.end-opts{display:flex;flex-direction:column;gap:8px;margin-top:16px}

.toast{position:fixed;bottom:13px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--gold);border-radius:7px;padding:8px 15px;font-family:var(--fm);font-size:11px;z-index:500;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red)}.toast.ok{border-color:var(--green)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

/* AdSense */

     crossorigin="anonymous"></script>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup-screen" class="screen active">
  <div class="setup-wrap">
    <div id="resume-banner" class="resume-banner" style="display:none" onclick="resumeLatest()">
      <div><div class="resume-text"><i class="ti ti-refresh"></i> 前回のゲームを再開する</div>
      <div class="resume-sub" id="resume-info"></div></div>
      <button style="background:var(--gold);color:#1a1000;border:none;padding:6px 13px;font-family:var(--fm);font-weight:600;border-radius:6px;cursor:pointer">再開 →</button>
    </div>
    <div class="setup-head"><h1>♠ POKER CHIPS ♠</h1><p>TEXAS HOLD'EM CHIP MANAGER</p></div>

    <div class="card-box">
      <div class="sec-title">基本設定</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fgroup" style="margin:0">
          <label class="flabel">プレイヤー人数</label>
          <select class="finput" id="player-count" onchange="updatePlayerInputs()">
            <option value="2">2人</option><option value="3">3人</option><option value="4">4人</option>
            <option value="5">5人</option><option value="6" selected>6人</option><option value="7">7人</option>
            <option value="8">8人</option><option value="9">9人</option><option value="10">10人</option>
            <option value="11">11人</option><option value="12">12人</option>
          </select>
        </div>
        <div class="fgroup" style="margin:0">
          <label class="flabel">初期チップ</label>
          <input class="finput" type="number" id="start-chips" value="10000" min="100" step="100">
        </div>
      </div>
    </div>

    <div class="card-box">
      <div class="sec-title">プレイヤー名</div>
      <div class="player-list" id="player-name-inputs"></div>
    </div>

    <div class="card-box">
      <div class="sec-title">ブラインド設定</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="fgroup" style="margin:0">
          <label class="flabel">ブラインド</label>
          <select class="finput" id="blind-mode" onchange="toggleBlindInputs()">
            <option value="on">あり</option><option value="off">なし</option>
          </select>
        </div>
        <div class="fgroup" id="sb-group" style="margin:0">
          <label class="flabel">SB</label>
          <input class="finput" type="number" id="sb-amount" value="50" min="1">
        </div>
        <div class="fgroup" id="bb-group" style="margin:0">
          <label class="flabel">BB</label>
          <input class="finput" type="number" id="bb-amount" value="100" min="1">
        </div>
      </div>

      <!-- Escalation toggle -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span class="flabel" style="margin:0">ブラインド増額</span>
        <button class="btn btn-toggle" id="esc-toggle-btn" onclick="toggleEscalation()">OFF</button>
      </div>
      <div class="esc-panel hidden" id="esc-panel">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          <div class="fgroup" style="margin:0">
            <label class="flabel">何ゲームごと</label>
            <input class="finput" type="number" id="esc-interval" value="5" min="1" max="99">
          </div>
          <div class="fgroup" style="margin:0">
            <label class="flabel">SB増額 (¥)</label>
            <input class="finput" type="number" id="esc-sb-add" value="25" min="0" step="25">
          </div>
          <div class="fgroup" style="margin:0">
            <label class="flabel">BB増額 (¥)</label>
            <input class="finput" type="number" id="esc-bb-add" value="50" min="0" step="25">
          </div>
        </div>
        <div style="font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:6px" id="esc-preview"></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr auto;gap:9px">
      <button class="btn btn-gold" onclick="startGame()"><i class="ti ti-cards"></i> ゲーム開始</button>
      <button class="btn btn-sec" onclick="openLoadModal()"><i class="ti ti-folder-open"></i> 読み込み</button>
    </div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen" class="screen">
  <div class="game-wrap">
    <div class="g-header">
      <div>
        <div class="stage-lbl" id="stage-lbl">PRE-FLOP</div>
        <div class="round-lbl" id="round-lbl">ゲーム 1</div>
        <div class="blind-lbl" id="blind-lbl"></div>
      </div>
      <div style="text-align:center"><div class="pot-lbl">TOTAL POT</div><div class="pot-big" id="hdr-pot">¥0</div></div>
      <div class="hdr-btns">
        <button class="btn btn-ghost btn-sm" onclick="openSaveModal()"><i class="ti ti-device-floppy"></i> 保存</button>
        <button class="btn btn-ghost btn-sm" onclick="openLoadModal()"><i class="ti ti-folder-open"></i></button>
      </div>
    </div>
    <div class="table-area" id="table-area"></div>
    <div class="action-panel">
      <div class="ap-info">
        <span>アクション:</span><span class="ap-player" id="ap-name">--</span>
        <span class="ap-call" id="ap-call"></span>
        <button class="undo-btn" id="undo-btn" onclick="undoAction()"><i class="ti ti-arrow-back-up"></i> 取り消し</button>
      </div>
      <div class="raise-area" id="raise-area">
        <label>レイズ額:</label>
        <div class="raise-input-wrap">
          <button class="raise-stepper" onclick="stepRaise(-100)">−</button>
          <input type="number" class="raise-input" id="raise-input" min="0" step="100">
          <button class="raise-stepper" onclick="stepRaise(100)">+</button>
        </div>
        <span class="raise-hint" id="raise-hint"></span>
        <button class="raise-ok" onclick="doAction('raise')">確定</button>
        <button class="raise-cancel" onclick="hideRaise()">×</button>
      </div>
      <div class="act-grid">
        <button class="act-btn act-fold" onclick="doAction('fold')"><i class="ti ti-x"></i>フォールド</button>
        <button class="act-btn act-call" id="btn-call" onclick="doAction('call')">
          <i class="ti ti-arrow-right"></i><span>コール</span><span class="act-sub" id="call-sub"></span>
        </button>
        <button class="act-btn act-check" id="btn-check" onclick="doAction('check')"><i class="ti ti-check"></i>チェック</button>
        <button class="act-btn act-raise" id="btn-raise" onclick="showRaise()"><i class="ti ti-trending-up"></i>レイズ</button>
        <button class="act-btn act-allin" id="btn-allin" onclick="doAction('allin')"><i class="ti ti-flame" style="font-size:16px"></i>オールイン</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ WINNER ══ -->
<div id="winner-screen" class="screen">
  <div class="win-wrap">
    <div class="win-title">SHOWDOWN</div>
    <div class="win-sub">勝者を選択（複数で山分け）</div>
    <div class="win-grid" id="win-grid"></div>
    <div style="font-family:var(--fm);font-size:11px;color:var(--muted);margin-bottom:11px" id="win-pot-info"></div>
    <button class="btn btn-gold" style="width:100%" onclick="confirmWinner()"><i class="ti ti-trophy"></i> チップを分配する</button>
  </div>
</div>

<!-- ══ END ══ -->
<div id="end-screen" class="screen">
  <div class="end-wrap" id="end-content"></div>
</div>

<!-- ══ SAVE MODAL ══ -->
<div class="modal-overlay" id="save-modal">
  <div class="modal-box">
    <div class="modal-title">💾 保存スロット</div>
    <div id="save-slots-ui"></div>
    <div style="margin-top:10px;text-align:right"><button class="btn btn-ghost btn-sm" onclick="closeModal('save-modal')">閉じる</button></div>
  </div>
</div>

<!-- ══ LOAD MODAL ══ -->
<div class="modal-overlay" id="load-modal">
  <div class="modal-box">
    <div class="modal-title">📂 ゲームを読み込む</div>
    <div id="load-slots-ui"></div>
    <div style="margin-top:10px;text-align:right"><button class="btn btn-ghost btn-sm" onclick="closeModal('load-modal')">閉じる</button></div>
  </div>
</div>

<!-- ══ AFTER-SAVE MODAL ══ -->
<div class="modal-overlay" id="after-save-modal">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div class="modal-title">✅ 保存しました</div>
    <p style="font-family:var(--fm);font-size:12px;color:var(--muted);margin-bottom:18px">次のアクションを選んでください</p>
    <div style="display:flex;flex-direction:column;gap:9px">
      <button class="btn btn-gold" style="width:100%" onclick="closeModal('after-save-modal')"><i class="ti ti-cards"></i> ゲームを続ける</button>
      <button class="btn btn-sec" style="width:100%" onclick="goToSetupFromModal()"><i class="ti ti-settings"></i> 設定に戻る</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════ STATE ═══════════════
let G = null;
let hist = [];
const STAGES = ['preflop','flop','turn','river'];
const SLBL = {preflop:'PRE-FLOP',flop:'FLOP',turn:'TURN',river:'RIVER'};
const CCNT = {preflop:0,flop:3,turn:4,river:5};
const MAX_SLOTS = 5;

// ─── Undo ───
function snapshot(){
  hist.push(JSON.stringify({...G,playersWhoActed:[...G.playersWhoActed]}));
  if(hist.length>30) hist.shift();
  document.getElementById('undo-btn').style.display='inline-flex';
}
function undoAction(){
  if(!hist.length){showToast('取り消せる操作がありません','err');return;}
  G=JSON.parse(hist.pop());
  G.playersWhoActed=Array.from(new Set(G.playersWhoActed||[]));
  if(!hist.length) document.getElementById('undo-btn').style.display='none';
  updateGameUI(); showToast('取り消しました','ok');
}

// ═══════════════ SETUP ═══════════════
let escOn=false;
function toggleEscalation(){
  escOn=!escOn;
  const btn=document.getElementById('esc-toggle-btn');
  btn.textContent=escOn?'ON':'OFF';
  btn.classList.toggle('on',escOn);
  document.getElementById('esc-panel').classList.toggle('hidden',!escOn);
  if(escOn) updateEscPreview();
}
function updateEscPreview(){
  if(!escOn) return;
  const interval=parseInt(document.getElementById('esc-interval').value)||5;
  const sbAdd=parseInt(document.getElementById('esc-sb-add').value)||0;
  const bbAdd=parseInt(document.getElementById('esc-bb-add').value)||0;
  const sb0=parseInt(document.getElementById('sb-amount').value)||50;
  const bb0=parseInt(document.getElementById('bb-amount').value)||100;
  const ex=`${interval}ゲームごとに SB +¥${sbAdd} / BB +¥${bbAdd} → ゲーム${interval+1}〜: SB ¥${sb0+sbAdd} / BB ¥${bb0+bbAdd}`;
  document.getElementById('esc-preview').textContent=ex;
}
['esc-interval','esc-sb-add','esc-bb-add','sb-amount','bb-amount'].forEach(id=>{
  // add listener after DOM ready
  setTimeout(()=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',updateEscPreview);
  },0);
});

function updatePlayerInputs(){
  const n=parseInt(document.getElementById('player-count').value);
  const list=document.getElementById('player-name-inputs');
  list.innerHTML='';
  for(let i=1;i<=n;i++){
    const row=document.createElement('div');
    row.className='player-row';
    row.innerHTML=`<span class="player-num">${i}</span><input class="finput" type="text" value="Player ${i}" id="pname-${i}">`;
    list.appendChild(row);
  }
}
function toggleBlindInputs(){
  const on=document.getElementById('blind-mode').value==='on';
  ['sb-group','bb-group'].forEach(id=>document.getElementById(id).style.opacity=on?'1':'0.4');
}
function startGame(){
  const n=parseInt(document.getElementById('player-count').value);
  const chips=parseInt(document.getElementById('start-chips').value)||10000;
  const sbAmt=parseInt(document.getElementById('sb-amount').value)||50;
  const bbAmt=parseInt(document.getElementById('bb-amount').value)||100;
  const blind=document.getElementById('blind-mode').value;
  const escInterval=parseInt(document.getElementById('esc-interval').value)||5;
  const escSbAdd=parseInt(document.getElementById('esc-sb-add').value)||0;
  const escBbAdd=parseInt(document.getElementById('esc-bb-add').value)||0;
  const players=[];
  for(let i=0;i<n;i++){
    const el=document.getElementById(`pname-${i+1}`);
    players.push({name:el?el.value.trim()||`P${i+1}`:`P${i+1}`,chips,status:'active',bet:0,totalBet:0,isAllIn:false});
  }
  G={players,dealerIdx:0,sbIdx:1%n,bbIdx:2%n,round:1,stage:'preflop',
     currentPlayerIdx:0,pot:0,sidePots:[],currentBet:0,minRaise:bbAmt,
     betsThisRound:{},totalBetsThisRound:{},playersWhoActed:[],
     blindMode:blind,sbAmount:sbAmt,bbAmount:bbAmt,baseSB:sbAmt,baseBB:bbAmt,
     escMode:escOn?'on':'off',escInterval,escSbAdd,escBbAdd};
  hist=[];
  initRound();
  showScreen('game');
}

// ═══════════════ ROUND ═══════════════
function initRound(){
  // Blind escalation (fixed-amount)
  if(G.escMode==='on'&&G.round>1){
    const level=Math.floor((G.round-1)/G.escInterval);
    G.sbAmount=G.baseSB+level*G.escSbAdd;
    G.bbAmount=G.baseBB+level*G.escBbAdd;
  }
  G.stage='preflop'; G.pot=0; G.sidePots=[];
  G.currentBet=0; G.minRaise=G.bbAmount;
  G.betsThisRound={}; G.totalBetsThisRound={}; G.playersWhoActed=[];
  G.players.forEach(p=>{
    if(p.chips>0){p.status='active';p.bet=0;p.totalBet=0;p.isAllIn=false;}
    else p.status='busted';
  });
  const alive=G.players.map((_,i)=>i).filter(i=>G.players[i].status==='active');
  if(alive.length<2){showGameOver();return;}
  if(G.blindMode==='on'){
    postBlind(G.sbIdx,G.sbAmount);
    postBlind(G.bbIdx,G.bbAmount);
    G.currentBet=G.bbAmount; G.minRaise=G.bbAmount;
    G.playersWhoActed=[G.sbIdx];
    G.currentPlayerIdx=nextActive(G.bbIdx);
  } else {
    G.currentPlayerIdx=nextActive(G.dealerIdx);
  }
  document.getElementById('round-lbl').textContent=`ゲーム ${G.round}`;
  document.getElementById('stage-lbl').textContent=SLBL[G.stage];
  document.getElementById('blind-lbl').textContent=G.blindMode==='on'?`SB ¥${G.sbAmount.toLocaleString()} / BB ¥${G.bbAmount.toLocaleString()}`:'';
  hist=[]; document.getElementById('undo-btn').style.display='none';
  hideRaise();
  updateGameUI();
}
function postBlind(idx,amount){
  const p=G.players[idx]; if(!p||p.status==='busted') return;
  const a=Math.min(amount,p.chips);
  p.chips-=a; p.bet+=a; p.totalBet+=a; G.pot+=a;
  G.betsThisRound[idx]=(G.betsThisRound[idx]||0)+a;
  G.totalBetsThisRound[idx]=(G.totalBetsThisRound[idx]||0)+a;
  if(p.chips===0){p.isAllIn=true;p.status='allin';}
}

// ═══════════════ ACTIONS ═══════════════
function doAction(action){
  const idx=G.currentPlayerIdx;
  const p=G.players[idx];
  if(!p||p.status!=='active') return;
  snapshot();

  if(action==='fold'){
    p.status='folded';

  } else if(action==='check'){
    const need=G.currentBet-(G.betsThisRound[idx]||0);
    if(need>0){hist.pop();showToast('チェックできません — コールが必要です','err');return;}

  } else if(action==='call'){
    const myBet=G.betsThisRound[idx]||0;
    const need=Math.min(G.currentBet-myBet, p.chips);
    if(need<=0){
      // already matched — treat as check
    } else {
      p.chips-=need; p.bet+=need; p.totalBet+=need; G.pot+=need;
      G.betsThisRound[idx]=myBet+need;
      G.totalBetsThisRound[idx]=(G.totalBetsThisRound[idx]||0)+need;
      if(p.chips===0){p.isAllIn=true;p.status='allin';}
    }

  } else if(action==='raise'){
    const raiseTotal=parseInt(document.getElementById('raise-input').value)||0;
    const myBet=G.betsThisRound[idx]||0;
    // Re-raise rule: if current bet > 0, new raise total must be >= currentBet*2
    const minNeeded=G.currentBet>0 ? Math.max(G.currentBet+G.minRaise, G.currentBet*2) : G.currentBet+G.minRaise;
    if(raiseTotal<minNeeded){
      hist.pop();
      showToast(`最低 ¥${minNeeded.toLocaleString()} 必要です`,'err');
      return;
    }
    const add=raiseTotal-myBet;
    const actual=Math.min(add,p.chips);
    p.chips-=actual; p.bet+=actual; p.totalBet+=actual; G.pot+=actual;
    G.betsThisRound[idx]=myBet+actual;
    G.totalBetsThisRound[idx]=(G.totalBetsThisRound[idx]||0)+actual;
    const nb=G.betsThisRound[idx];
    if(nb>G.currentBet){G.minRaise=nb-G.currentBet;G.currentBet=nb;G.playersWhoActed=[idx];}
    if(p.chips===0){p.isAllIn=true;p.status='allin';}
    hideRaise();

  } else if(action==='allin'){
    const amt=p.chips;
    const myBet=G.betsThisRound[idx]||0;
    G.betsThisRound[idx]=myBet+amt;
    G.totalBetsThisRound[idx]=(G.totalBetsThisRound[idx]||0)+amt;
    p.bet+=amt; p.totalBet+=amt; G.pot+=amt;
    if(G.betsThisRound[idx]>G.currentBet){
      G.minRaise=G.betsThisRound[idx]-G.currentBet;
      G.currentBet=G.betsThisRound[idx];
      G.playersWhoActed=[idx];
    }
    p.chips=0; p.isAllIn=true; p.status='allin';
  }

  if(!G.playersWhoActed.includes(idx)) G.playersWhoActed.push(idx);
  advanceTurn();
}

function advanceTurn(){
  const notFolded=G.players.map((_,i)=>i).filter(i=>!['folded','busted'].includes(G.players[i].status));
  if(notFolded.length===1){awardPot(notFolded);return;}
  const canAct=notFolded.filter(i=>G.players[i].status==='active');
  const allActed=canAct.length===0||canAct.every(i=>G.playersWhoActed.includes(i));
  const allCalled=canAct.every(i=>(G.betsThisRound[i]||0)>=G.currentBet);
  if(allActed&&allCalled){nextStage();return;}
  // Find next active player after current
  const n=G.players.length;
  let next=-1;
  for(let i=1;i<=n;i++){
    const t=(G.currentPlayerIdx+i)%n;
    if(G.players[t].status==='active'){next=t;break;}
  }
  if(next===-1){nextStage();return;}
  G.currentPlayerIdx=next;
  updateGameUI();
}

// ═══════════════ STAGE ═══════════════
function nextStage(){
  const si=STAGES.indexOf(G.stage);
  if(si===STAGES.length-1){startShowdown();return;}
  G.stage=STAGES[si+1];
  document.getElementById('stage-lbl').textContent=SLBL[G.stage];
  G.currentBet=0; G.betsThisRound={}; G.playersWhoActed=[];
  G.players.forEach(p=>{if(!['folded','busted'].includes(p.status)&&!p.isAllIn) p.bet=0; else if(!['folded','busted'].includes(p.status)) p.bet=0;});
  calcSidePots();
  const canAct=G.players.map((_,i)=>i).filter(i=>G.players[i].status==='active');
  if(canAct.length===0){setTimeout(()=>nextStage(),300);return;}
  G.currentPlayerIdx=nextActive(G.dealerIdx);
  hist=[]; document.getElementById('undo-btn').style.display='none';
  hideRaise();
  updateGameUI(); showToast(SLBL[G.stage]+' へ進みました','ok');
}
function nextActive(from){
  for(let i=1;i<=G.players.length;i++){
    const idx=(from+i)%G.players.length;
    if(['active','allin'].includes(G.players[idx].status)) return idx;
  }
  return from;
}
function calcSidePots(){
  G.sidePots=G.players.map((_,i)=>i).filter(i=>G.players[i].isAllIn)
    .map(i=>({label:`${G.players[i].name} SP`,amt:G.totalBetsThisRound[i]||0}))
    .sort((a,b)=>a.amt-b.amt);
}

// ═══════════════ SHOWDOWN / END ═══════════════
function startShowdown(){
  const rem=G.players.map((_,i)=>i).filter(i=>!['folded','busted'].includes(G.players[i].status));
  if(rem.length===1){awardPot(rem);return;}
  showScreen('winner');
  const grid=document.getElementById('win-grid'); grid.innerHTML='';
  rem.forEach(i=>{
    const p=G.players[i]; const c=document.createElement('div');
    c.className='win-card'; c.dataset.idx=i;
    c.onclick=()=>c.classList.toggle('sel');
    c.innerHTML=`<div><div class="win-card-name">${p.name}</div><div class="win-card-chips">残: ¥${p.chips.toLocaleString()}</div></div><i class="ti ti-check win-check"></i>`;
    grid.appendChild(c);
  });
  document.getElementById('win-pot-info').textContent=`ポット ¥${G.pot.toLocaleString()} を分配`;
}
function confirmWinner(){
  const sel=[...document.querySelectorAll('.win-card.sel')].map(c=>+c.dataset.idx);
  if(!sel.length){showToast('勝者を選んでください','err');return;}
  awardPot(sel);
}
function awardPot(winners){
  const share=Math.floor(G.pot/winners.length);
  const rem=G.pot-share*winners.length;
  winners.forEach((i,j)=>{G.players[i].chips+=share+(j===0?rem:0);});
  showEndScreen(winners.map(i=>G.players[i].name).join(', '),share,winners.length>1);
}
function showEndScreen(names,share,split){
  showScreen('end');
  const alive=G.players.filter(p=>p.chips>0);
  const el=document.getElementById('end-content');
  if(alive.length===1){
    el.innerHTML=`<div style="font-size:52px">🏆</div>
      <div style="font-family:var(--fh);font-size:26px;color:var(--gold);margin:6px 0">${alive[0].name}</div>
      <div style="font-family:var(--fm);color:var(--muted);font-size:10px;margin-bottom:4px">ゲーム優勝！</div>
      <div style="font-family:var(--fh);font-size:26px;color:var(--gold2);margin-bottom:18px">¥${alive[0].chips.toLocaleString()}</div>
      <div class="end-opts">
        <button class="btn btn-gold" onclick="resetToSetup()"><i class="ti ti-refresh"></i> 新しいゲームを設定</button>
        <button class="btn btn-sec" onclick="openSaveModal()"><i class="ti ti-device-floppy"></i> 保存</button>
      </div>`;
    return;
  }
  const rows=G.players.filter(p=>p.status!=='busted').map(p=>`
    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--fm);font-size:11px">
      <span>${p.name}</span><span style="color:${p.chips>0?'var(--gold)':'var(--red)'}">¥${p.chips.toLocaleString()}</span>
    </div>`).join('');
  el.innerHTML=`
    <div style="font-family:var(--fh);font-size:30px;color:var(--gold)">🃏 R${G.round} 終了</div>
    <div style="font-family:var(--fh);font-size:19px;margin:5px 0">${names}</div>
    <div style="font-family:var(--fm);font-size:13px;color:var(--green);margin-bottom:10px">+¥${share.toLocaleString()}${split?' (山分け)':''} 獲得</div>
    <div class="card-box" style="text-align:left;margin-bottom:0">${rows}</div>
    <div class="end-opts">
      <button class="btn btn-gold" onclick="nextRound()"><i class="ti ti-arrow-right"></i> 次のゲームへ</button>
      <button class="btn btn-sec" onclick="openSaveModal()"><i class="ti ti-device-floppy"></i> 保存して中断</button>
    </div>`;
}
function showGameOver(){showEndScreen(G.players.find(p=>p.chips>0)?.name||'',0,false);}
function nextRound(){
  G.round++;
  const n=G.players.length;
  let d=G.dealerIdx; let sb=G.sbIdx; let bb=G.bbIdx;
  d=(d+1)%n; sb=(sb+1)%n; bb=(bb+1)%n;
  while(G.players[sb].chips===0) sb=(sb+1)%n;
  while(G.players[bb].chips===0) bb=(bb+1)%n;
  G.dealerIdx=d; G.sbIdx=sb; G.bbIdx=bb;
  initRound(); showScreen('game');
}

// ═══════════════ RENDER TABLE ═══════════════
function updateGameUI(){
  document.getElementById('hdr-pot').textContent='¥'+G.pot.toLocaleString();
  document.getElementById('stage-lbl').textContent=SLBL[G.stage];
  renderTable();
  updateActionPanel();
}

function renderTable(){
  const area=document.getElementById('table-area');
  const W=area.clientWidth||380;
  const H=area.clientHeight||270;
  area.innerHTML='';

  // ── Wider, flatter oval (race-track shape) ──
  // rx >> ry to match the image proportions
  const TW=Math.min(W*0.82,560);
  const TH=Math.min(H*0.55,180);
  const cx=W/2, cy=H/2;
  const rx=TW/2, ry=TH/2;
  const TX=cx-rx, TY=cy-ry;

  // SVG
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','tbl-svg');
  svg.setAttribute('width',W); svg.setAttribute('height',H);

  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const grad=document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
  grad.setAttribute('id','feltG'); grad.setAttribute('cx','45%'); grad.setAttribute('cy','40%');
  [[0,'#2d5c2d'],[55,'#1a3a1a'],[100,'#0d2a0d']].forEach(([o,c])=>{
    const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
    s.setAttribute('offset',o+'%'); s.setAttribute('stop-color',c); grad.appendChild(s);
  });
  defs.appendChild(grad); svg.appendChild(defs);

  // Rail (outer, wood color)
  const rail=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  rail.setAttribute('cx',cx); rail.setAttribute('cy',cy);
  rail.setAttribute('rx',rx+13); rail.setAttribute('ry',ry+13);
  rail.setAttribute('fill','#8B6914'); svg.appendChild(rail);
  // Rail highlight
  const railH=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  railH.setAttribute('cx',cx); railH.setAttribute('cy',cy);
  railH.setAttribute('rx',rx+10); railH.setAttribute('ry',ry+10);
  railH.setAttribute('fill','none'); railH.setAttribute('stroke','#c8a050'); railH.setAttribute('stroke-width','2');
  svg.appendChild(railH);
  // Felt
  const felt=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  felt.setAttribute('cx',cx); felt.setAttribute('cy',cy);
  felt.setAttribute('rx',rx); felt.setAttribute('ry',ry);
  felt.setAttribute('fill','url(#feltG)'); svg.appendChild(felt);
  // Inner line
  const inner=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  inner.setAttribute('cx',cx); inner.setAttribute('cy',cy);
  inner.setAttribute('rx',rx-16); inner.setAttribute('ry',ry-16);
  inner.setAttribute('fill','none'); inner.setAttribute('stroke','rgba(255,255,255,0.06)'); inner.setAttribute('stroke-width','1');
  svg.appendChild(inner);
  area.appendChild(svg);

  // ── Community cards (center of table) ──
  const cc=CCNT[G.stage];
  const cW=24, cH=34, cGap=4;
  const totalCW=5*(cW+cGap)-cGap;
  const ccX=cx-totalCW/2, ccY=cy-cH/2-4;
  const comDiv=document.createElement('div');
  comDiv.style.cssText=`position:absolute;left:${ccX}px;top:${ccY}px;display:flex;gap:${cGap}px;pointer-events:none`;
  for(let i=0;i<5;i++){
    const c=document.createElement('div');
    c.style.width=cW+'px'; c.style.height=cH+'px'; c.style.borderRadius='3px'; c.style.flexShrink='0';
    c.style.display='flex'; c.style.alignItems='center'; c.style.justifyContent='center';
    if(i<cc){
      const suits=['♠','♥','♦','♣'];
      const sym=suits[i%4];
      const isRed=sym==='♥'||sym==='♦';
      c.style.background='linear-gradient(160deg,#f8f4ec,#e8e0d0)';
      c.style.border='1.5px solid rgba(200,180,120,.4)';
      c.innerHTML=`<span style="color:${isRed?'#c0392b':'#1a1a2e'};font-size:14px;line-height:1">${sym}</span>`;
    } else {
      c.style.background='rgba(255,255,255,.04)';
      c.style.border='1.5px dashed rgba(255,255,255,.1)';
    }
    comDiv.appendChild(c);
  }
  area.appendChild(comDiv);

  // ── Pot ──
  const potY=cy+cH/2+16;
  const potDiv=document.createElement('div');
  potDiv.className='tbl-pot';
  potDiv.style.cssText=`left:${cx}px;top:${potY}px`;
  let spHtml=G.sidePots.length?'<div style="margin-top:2px">'+G.sidePots.map(s=>`<span style="font-family:var(--fm);font-size:8px;padding:1px 5px;background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.35);border-radius:8px;color:#e74c3c;display:inline-block;margin:1px">${s.label}</span>`).join('')+'</div>':'';
  potDiv.innerHTML=`<div class="tbl-pot-lbl">POT</div><div class="tbl-pot-num">¥${G.pot.toLocaleString()}</div>${spHtml}`;
  area.appendChild(potDiv);

  // ── DUMMY DEALER (fixed top-center, outside table) ──
  const dealerSeatX=cx;
  const dealerSeatY=TY-28;
  const dealerDiv=document.createElement('div');
  dealerDiv.className='seat';
  dealerDiv.style.cssText=`left:${dealerSeatX}px;top:${dealerSeatY}px`;
  // which player is current dealer?
  const dealerPlayer=G.players[G.dealerIdx];
  dealerDiv.innerHTML=`<div class="seat-card dealer-dummy" style="min-width:80px">
    <div class="seat-name" style="color:var(--gold);font-size:11px">🂠 DEALER</div>
    <div style="font-family:var(--fm);font-size:8px;color:var(--muted);margin-top:1px">${dealerPlayer?dealerPlayer.name:''}</div>
  </div>`;
  area.appendChild(dealerDiv);

  // ── Player seats (bottom half only) ──
  // Place players in a wide arc covering bottom 180° (from left to right, bottom of oval)
  const n=G.players.length;
  // We spread players across angles from ~200° to ~340° (bottom arc)
  // 180° spread: from PI*1.1 to PI*1.9 (in radians), left to right across bottom
  const arcStart=Math.PI*1.08;
  const arcEnd=Math.PI*1.92;
  const seatRx=rx+60;
  const seatRy=ry+52;

  // Count non-busted players for spacing
  const activePl=G.players.map((_,i)=>i).filter(i=>G.players[i].status!=='busted');
  const totalPl=activePl.length;

  activePl.forEach((pi,arrIdx)=>{
    const p=G.players[pi];
    let angle;
    if(totalPl===1){
      angle=(arcStart+arcEnd)/2;
    } else {
      angle=arcStart+(arcEnd-arcStart)*(arrIdx/(totalPl-1));
    }
    const sx=cx+seatRx*Math.cos(angle);
    const sy=cy+seatRy*Math.sin(angle);

    const seat=document.createElement('div');
    seat.className='seat';
    seat.style.cssText=`left:${sx}px;top:${sy}px`;

    const isActive=pi===G.currentPlayerIdx&&p.status==='active';
    let cls='seat-card';
    if(isActive) cls+=' active';
    else if(p.status==='folded') cls+=' folded';
    else if(p.isAllIn) cls+=' allin';

    const roles=[];
    if(pi===G.dealerIdx) roles.push('<span class="bdg bdg-d">BTN</span>');
    if(G.blindMode==='on'){
      if(pi===G.sbIdx) roles.push('<span class="bdg bdg-sb">SB</span>');
      if(pi===G.bbIdx) roles.push('<span class="bdg bdg-bb">BB</span>');
    }
    if(p.isAllIn) roles.push('<span class="bdg bdg-ai">ALL IN</span>');
    if(p.status==='folded') roles.push('<span class="bdg bdg-f">FOLD</span>');
    const betHtml=p.bet>0?`<div class="seat-bet">bet ¥${p.bet.toLocaleString()}</div>`:'';
    const dot=isActive?'<div class="active-dot"></div>':'';

    seat.innerHTML=`<div class="${cls}">
      <div class="seat-name">${p.name}</div>
      <div class="seat-chips">¥${p.chips.toLocaleString()}</div>
      ${betHtml}
      <div class="seat-badges">${roles.join('')}</div>${dot}
    </div>`;
    area.appendChild(seat);
  });
}

// ─── Action Panel ───
function updateActionPanel(){
  const p=G.players[G.currentPlayerIdx]; if(!p) return;
  document.getElementById('ap-name').textContent=p.name;
  const myBet=G.betsThisRound[G.currentPlayerIdx]||0;
  const toCall=Math.max(0,G.currentBet-myBet);
  document.getElementById('ap-call').textContent=toCall>0?`コール: ¥${toCall.toLocaleString()}`:'';
  document.getElementById('call-sub').textContent=toCall>0?`¥${toCall.toLocaleString()}`:'';
  document.getElementById('btn-call').style.display=toCall>0?'flex':'none';
  document.getElementById('btn-check').style.display=toCall===0?'flex':'none';
  // Raise min: re-raise rule (currentBet > 0 → must be at least currentBet*2)
  const minR=G.currentBet>0 ? Math.max(G.currentBet+G.minRaise, G.currentBet*2) : G.currentBet+G.minRaise;
  const maxR=p.chips+myBet;
  const ri=document.getElementById('raise-input');
  ri.min=minR; ri.max=maxR;
  // Set to minR as default if current value is 0 or below min
  if(!ri.value||parseInt(ri.value)<minR) ri.value=minR;
  document.getElementById('raise-hint').textContent=`最低 ¥${minR.toLocaleString()} / 上限 ¥${maxR.toLocaleString()}`;
  document.getElementById('btn-raise').disabled=(p.chips||0)<=toCall;
  document.getElementById('btn-allin').disabled=(p.chips||0)===0;
}

function stepRaise(delta){
  const ri=document.getElementById('raise-input');
  const myBet=G.betsThisRound[G.currentPlayerIdx]||0;
  const p=G.players[G.currentPlayerIdx];
  const minR=G.currentBet>0 ? Math.max(G.currentBet+G.minRaise, G.currentBet*2) : G.currentBet+G.minRaise;
  const maxR=(p?p.chips:0)+myBet;
  let v=(parseInt(ri.value)||minR)+delta;
  v=Math.max(minR,Math.min(maxR,v));
  ri.value=v;
}

function showRaise(){
  const area=document.getElementById('raise-area');
  area.style.display='flex';
  // init value to min
  const myBet=G.betsThisRound[G.currentPlayerIdx]||0;
  const minR=G.currentBet>0 ? Math.max(G.currentBet+G.minRaise, G.currentBet*2) : G.currentBet+G.minRaise;
  document.getElementById('raise-input').value=minR;
  document.getElementById('raise-input').focus();
}
function hideRaise(){document.getElementById('raise-area').style.display='none';}

// ═══════════════ SAVE / LOAD ═══════════════
const MAX_SLOTS_N=5;
function getSK(slot){return `poker_v5_${slot}`;}
function getAllSaves(){
  const arr=[];
  for(let i=0;i<MAX_SLOTS_N;i++){
    try{const r=localStorage.getItem(getSK(i));arr.push({slot:i,data:r?JSON.parse(r):null});}
    catch(e){arr.push({slot:i,data:null});}
  }
  return arr;
}

function openSaveModal(){
  if(!G){showToast('ゲームが開始されていません','err');return;}
  const saves=getAllSaves();
  const ui=document.getElementById('save-slots-ui'); ui.innerHTML='';
  saves.forEach(s=>{
    const div=document.createElement('div'); div.className='save-item';
    const ts=s.data?new Date(s.data.savedAt||0).toLocaleString('ja-JP'):'空き';
    const info=s.data?`ゲーム ${s.data.round} — ${s.data.players.length}人 / ポット ¥${s.data.pot.toLocaleString()}<br><span style="color:var(--muted);font-size:9px">${ts}</span>`:'<span style="color:var(--muted);font-size:11px">空きスロット</span>';
    div.innerHTML=`<div><div class="save-item-name">スロット ${s.slot+1}</div><div class="save-item-meta">${info}</div></div>
      <div class="slot-btns">
        <button class="btn btn-gold btn-sm" onclick="saveToSlot(${s.slot})">保存</button>
        ${s.data?`<button class="btn btn-ghost btn-sm" onclick="deleteSlot(${s.slot})" style="color:var(--red);border-color:var(--red)"><i class="ti ti-trash"></i></button>`:''}
      </div>`;
    ui.appendChild(div);
  });
  document.getElementById('save-modal').classList.add('open');
}

function saveToSlot(slot){
  const save={...G,playersWhoActed:[...G.playersWhoActed],savedAt:Date.now()};
  localStorage.setItem(getSK(slot),JSON.stringify(save));
  closeModal('save-modal');
  // Show after-save choice modal
  document.getElementById('after-save-modal').classList.add('open');
}

function goToSetupFromModal(){
  closeModal('after-save-modal');
  resetToSetup();
}

function deleteSlot(slot){
  localStorage.removeItem(getSK(slot));
  openSaveModal();
  showToast(`スロット ${slot+1} を削除しました`);
}

function openLoadModal(){
  const saves=getAllSaves();
  const ui=document.getElementById('load-slots-ui'); ui.innerHTML='';
  const has=saves.some(s=>s.data!==null);
  if(!has){
    ui.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--muted);padding:10px 0">保存されたゲームはありません</div>';
  } else {
    saves.filter(s=>s.data).forEach(s=>{
      const div=document.createElement('div'); div.className='save-item';
      const ts=new Date(s.data.savedAt||0).toLocaleString('ja-JP');
      const names=s.data.players.map(p=>p.name).join(', ');
      div.innerHTML=`<div>
        <div class="save-item-name">スロット ${s.slot+1} — ゲーム ${s.data.round}</div>
        <div class="save-item-meta">${names}<br><span style="font-size:9px;color:var(--muted)">${ts}</span></div>
      </div>
      <div class="slot-btns">
        <button class="btn btn-gold btn-sm" onclick="loadSlot(${s.slot})">読込</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteSlot(${s.slot})" style="color:var(--red);border-color:var(--red)"><i class="ti ti-trash"></i></button>
      </div>`;
      ui.appendChild(div);
    });
  }
  document.getElementById('load-modal').classList.add('open');
}

function loadSlot(slot){
  try{
    const r=localStorage.getItem(getSK(slot)); if(!r) return;
    G=JSON.parse(r);
    G.playersWhoActed=Array.from(new Set(G.playersWhoActed||[]));
    hist=[];
    closeModal('load-modal');
    showScreen('game');
    setTimeout(()=>updateGameUI(),40);
    showToast(`スロット ${slot+1} を読み込みました`,'ok');
  }catch(e){showToast('読み込みに失敗しました','err');}
}

function resumeLatest(){
  const saves=getAllSaves().filter(s=>s.data).sort((a,b)=>(b.data.savedAt||0)-(a.data.savedAt||0));
  if(saves.length) loadSlot(saves[0].slot);
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m) m.classList.remove('open');});
});

function resetToSetup(){G=null;hist=[];updatePlayerInputs();showScreen('setup');}

// ═══════════════ MISC ═══════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
  if(name==='game') setTimeout(()=>{renderTable();updateActionPanel();},40);
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||''); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
function checkResume(){
  const saves=getAllSaves().filter(s=>s.data);
  if(!saves.length) return;
  saves.sort((a,b)=>(b.data.savedAt||0)-(a.data.savedAt||0));
  const l=saves[0].data;
  document.getElementById('resume-banner').style.display='flex';
  document.getElementById('resume-info').textContent=`ゲーム ${l.round} — ${l.players.length}人 — ${new Date(l.savedAt||0).toLocaleString('ja-JP')}`;
}
window.addEventListener('resize',()=>{if(G) renderTable();});
updatePlayerInputs();
checkResume();
</script>
